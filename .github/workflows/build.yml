# MCP Tool Hub CI/CD 工作流
# 触发条件:
#   - push 到 master/main 分支
#   - 创建/更新 Release
#   - 手动触发
name: Build & Release

on:
  push:
    branches: [master, main]
    tags:
      - "v*"
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      skip_web:
        description: "跳过 Web 前端构建"
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ═══════════════════════════════════════════════════════════════
  # 1. 构建 PyInstaller 可执行文件
  # ═══════════════════════════════════════════════════════════════
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true
          cache-dependency-paths: pyproject.toml

      - name: Install Node.js
        if: inputs.skip_web != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Sync dependencies
        run: uv sync

      - name: Build Web frontend
        if: inputs.skip_web != 'true'
        run: |
          cd web
          npm ci
          npm run build
        shell: pwsh

      - name: Build with PyInstaller
        run: .\build.ps1
        shell: pwsh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mcp-tool-hub-${{ runner.os }}
          path: |
            dist/mcp-tool-hub/
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════
  # 2. 构建 Inno Setup 安装包 (仅 Windows + Release/Tag)
  # ═══════════════════════════════════════════════════════════════
  installer:
    name: Build Installer
    needs: build
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'release'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: mcp-tool-hub-Windows
          path: dist/mcp-tool-hub/

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Inno Setup
        run: |
          choco install innosetup -y
        shell: pwsh

      - name: Build installer
        run: .\build.ps1 -Inno -SkipInstall -SkipWeb
        shell: pwsh

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: mcp-tool-hub-installer
          path: dist/mcp-tool-hub-*-setup.exe
          retention-days: 30

  # ═══════════════════════════════════════════════════════════════
  # 3. 发布 Release (仅当推送 tag 时)
  # ═══════════════════════════════════════════════════════════════
