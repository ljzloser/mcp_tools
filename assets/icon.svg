<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C5CE7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0984E3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="hub" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFFFFF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#DFE6E9;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="16" y="16" width="224" height="224" rx="48" ry="48" fill="url(#bg)"/>
  <!-- Hub center circle -->
  <circle cx="128" cy="128" r="28" fill="url(#hub)" opacity="0.95"/>
  <!-- Connection lines -->
  <line x1="128" y1="100" x2="128" y2="62" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <line x1="128" y1="156" x2="128" y2="194" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <line x1="100" y1="128" x2="62" y2="128" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <line x1="156" y1="128" x2="194" y2="128" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.85"/>
  <line x1="108" y1="108" x2="76" y2="76" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="148" y1="108" x2="180" y2="76" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="108" y1="148" x2="76" y2="180" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <line x1="148" y1="148" x2="180" y2="180" stroke="white" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <!-- Outer nodes -->
  <circle cx="128" cy="54" r="14" fill="white" opacity="0.9"/>
  <circle cx="128" cy="202" r="14" fill="white" opacity="0.9"/>
  <circle cx="54" cy="128" r="14" fill="white" opacity="0.9"/>
  <circle cx="202" cy="128" r="14" fill="white" opacity="0.9"/>
  <circle cx="70" cy="70" r="10" fill="white" opacity="0.7"/>
  <circle cx="186" cy="70" r="10" fill="white" opacity="0.7"/>
  <circle cx="70" cy="186" r="10" fill="white" opacity="0.7"/>
  <circle cx="186" cy="186" r="10" fill="white" opacity="0.7"/>
</svg>
